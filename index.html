<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A premium, glassmorphic Windows 11-style desktop widget displaying match details, flags, locations, and PST times for the FIFA 2026 World Cup games on June 23, 2026. Features an interactive live match simulation.">
  <title>FIFA World Cup 2026 Today's Matches Widget</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="widget-page">
  <!-- Glowing backdrops for glassmorphism effects -->
  <div class="glow-bg glow-blue" id="glow-blue"></div>
  <div class="glow-bg glow-purple" id="glow-purple"></div>
  <div class="glow-bg glow-green" id="glow-green"></div>

  <!-- Main Widget Wrapper -->
  <main id="widget-container" class="widget-container layout-horizontal" aria-label="FIFA 2026 World Cup Match Widget">
    
    <!-- Widget Header -->
    <header class="widget-header">
      <div class="header-left">
        <div class="badge-fifa">
          <svg class="logo-svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
          <span>FIFA 2026</span>
        </div>
        <h1 class="widget-title">Today's Matches</h1>
        <p class="widget-subtitle" id="widget-date-display">Tuesday, June 23, 2026</p>
      </div>
      
      <div class="header-right">
        <!-- Configuration Toggles -->
        <div class="toggle-group" role="group" aria-label="Widget configuration controls">
          <!-- Layout Switcher -->
          <button id="toggle-layout-btn" class="icon-btn" title="Toggle Layout Mode (Horizontal/Vertical)" aria-label="Toggle Layout Mode">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
          </button>
          
          <!-- Timezone Toggler -->
          <button id="toggle-timezone-btn" class="text-toggle-btn" title="Switch Timezone (PST/ET)" aria-label="Switch Timezone">
            <span class="active-tz">PST</span><span class="tz-slash">/</span><span class="inactive-tz">ET</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Match Grid / List Container -->
    <section class="matches-grid" id="matches-grid" aria-label="World Cup Match Cards">
      <!-- Cards dynamically generated by app.js -->
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading World Cup matches...</p>
      </div>
    </section>


  </main>

  <!-- Match Details Modal -->
  <dialog id="match-details-modal" class="details-modal">
    <div class="modal-backdrop" id="modal-backdrop-blur"></div>
    <div class="modal-content-wrapper">
      <div class="modal-content-glass">
        <!-- Close Button -->
        <button id="modal-close-btn" class="modal-close" aria-label="Close Details Modal">×</button>
        
        <div id="modal-body-content">
          <!-- Content dynamically updated by app.js -->
          <div class="modal-loading">
            <div class="spinner"></div>
            <p>Gathering team statistics...</p>
          </div>
        </div>
      </div>
    </div>
  </dialog>



  <!-- Load Scripts -->
  <script src="app.js" defer></script>
</body>
</html>
